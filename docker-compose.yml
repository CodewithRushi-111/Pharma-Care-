version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacare_pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pharma_care
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharma_care"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmacare_net

  redis:
    image: redis:7-alpine
    container_name: pharmacare_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmacare_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacare_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/pharma_care?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super_secret_jwt_access_key_enterprise_2026
      REFRESH_TOKEN_SECRET: super_secret_jwt_refresh_key_enterprise_2026
      CLOUDINARY_CLOUD_NAME: mock_cloudinary_cloud
      CLOUDINARY_API_KEY: 123456789012345
      CLOUDINARY_API_SECRET: mock_cloudinary_secret
      GEMINI_API_KEY: mock_gemini_api_key
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: no-reply@pharmacare.local
      SMTP_PASS: mock_smtp_password
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - pharmacare_net

volumes:
  pg_data:
  redis_data:

networks:
  pharmacare_net:
    driver: bridge
