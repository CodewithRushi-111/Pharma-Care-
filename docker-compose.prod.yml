version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacare_pg_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prodsecretpwd2026}
      POSTGRES_DB: pharma_care_prod
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharma_care_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmacare_prod_net

  redis:
    image: redis:7-alpine
    container_name: pharmacare_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-prodrediskey2026}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-prodrediskey2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pharmacare_prod_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacare_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - pharmacare_prod_net

  nginx:
    image: nginx:alpine
    container_name: pharmacare_nginx_proxy
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pharmacare_prod_net

volumes:
  pg_prod_data:
  redis_prod_data:

networks:
  pharmacare_prod_net:
    driver: bridge
